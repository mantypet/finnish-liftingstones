<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suomen nostokivet</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      background: #1a1a1a;
      color: #f0f0f0;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: #111;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    header .subtitle {
      font-size: 0.8rem;
      color: #888;
      margin-left: auto;
    }

    #map {
      flex: 1;
    }

    .stone-marker {
      font-size: 22px;
      line-height: 30px;
      text-align: center;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,0.6));
      cursor: pointer;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 8px;
      padding: 0;
      overflow: hidden;
    }

    .leaflet-popup-content {
      margin: 0;
    }

    .popup-content h3 {
      background: #2d2d2d;
      color: #f0f0f0;
      padding: 10px 14px 8px;
      font-size: 1rem;
      border-bottom: 1px solid #444;
    }

    .popup-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    .popup-table td {
      padding: 6px 14px;
      border-bottom: 1px solid #eee;
      vertical-align: top;
    }

    .popup-table td:first-child {
      font-weight: 600;
      color: #555;
      white-space: nowrap;
      width: 80px;
    }

    .popup-table tr:last-child td {
      border-bottom: none;
    }

    .popup-notes {
      color: #666;
      font-style: italic;
    }

    footer {
      font-size: 0.72rem;
      color: #555;
      text-align: center;
      padding: 4px;
      background: #111;
      flex-shrink: 0;
    }

    footer a { color: #777; }
  </style>
</head>
<body>

<header>
  <span style="font-size:1.5rem">🪨</span>
  <h1>Suomen nostokivet</h1>
  <span class="subtitle" id="count">ladataan…</span>
</header>

<div id="map"></div>

<footer>
  Koordinaatit: EUREF-FIN / TM35FIN (EPSG:3067) &nbsp;|&nbsp;
  Lähde: <a href="https://liftingstones.org/map" target="_blank">liftingstones.org</a>
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
